[meta]
name = "versioning-zerover"
description = "Zerover keeps major at 0, breaking change bumps minor instead"

[config]
content = '''
{
  "workspace": {
    "versioning": "zerover"
  },
  "package": [
    {
      "name": "mylib",
      "path": ".",
      "versioned_files": [{"path": "version.toml", "format": "toml"}]
    }
  ]
}
'''

[[packages]]
name = "mylib"
path = "."
initial_version = "0.5.0"
tag = "v0.5.0"

[[commits]]
message = "feat!: breaking API change"
files = ["src/api.rs"]

[expect]
check_contains = ["mylib", "0.6.0"]
check_not_contains = ["Nothing to release", "1.0.0"]
