[meta]
name = "tag-custom-template"
description = "Custom tag template with non-default pattern"

[config]
content = '''
{
  "workspace": {
    "tagTemplate": "release-{name}-{version}"
  },
  "package": [
    {
      "name": "myapp",
      "path": ".",
      "versioned_files": [{"path": "version.toml", "format": "toml"}]
    }
  ]
}
'''

[[packages]]
name = "myapp"
path = "."
initial_version = "1.0.0"

[[tags]]
name = "release-myapp-1.0.0"
at_commit = -1

[[commits]]
message = "feat: add notifications"
files = ["src/notify.rs"]

[expect]
check_contains = ["myapp", "1.1.0", "minor"]
check_not_contains = ["Nothing to release"]
