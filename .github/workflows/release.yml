name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.6.0)'
        required: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: ferrflow
            archive: ferrflow-linux-x64.tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: ferrflow
            archive: ferrflow-linux-arm64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: ferrflow
            archive: ferrflow-darwin-x64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: ferrflow
            archive: ferrflow-darwin-arm64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: ferrflow.exe
            archive: ferrflow-windows-x64.zip
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.name }}
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cross build --release --target ${{ matrix.target }}
      - name: Build (macOS / Windows)
        if: matrix.os != 'ubuntu-latest'
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf ${{ matrix.archive }} \
            -C target/${{ matrix.target }}/release ${{ matrix.binary }}
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/${{ matrix.binary }} `
            -DestinationPath ${{ matrix.archive }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.name }}
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/*
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: artifacts/*
          generate_release_notes: false

  publish-crate:
    name: Publish crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.name }}
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo publish --allow-dirty --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.name }}
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Extract version
        id: version
        run: echo "value=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ steps.tag.outputs.name }}
      - name: Publish platform packages and wrapper
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash npm/scripts/publish.sh "${{ steps.version.outputs.value }}"

  publish-wasm:
    name: Publish @ferrflow/wasm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.name }}
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Extract version
        id: version
        run: echo "value=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ steps.tag.outputs.name }}
      - name: Build and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bash npm/scripts/publish-wasm.sh "${{ steps.version.outputs.value }}"

  update-major-tag:
    name: Update major version tag
    needs: release
    runs-on: ubuntu-latest
    concurrency:
      group: update-major-tag
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.name }}
      - name: Move major version tag
        run: |
          MAJOR="v$(echo "${TAG#v}" | cut -d. -f1)"
          git tag -f "$MAJOR"
          git push origin "refs/tags/$MAJOR" --force
        env:
          TAG: ${{ steps.tag.outputs.name }}

  publish-docker:
    name: Publish Docker
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.name }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "value=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ steps.tag.outputs.name }}
      - uses: docker/build-push-action@v7
        id: docker-push
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/ferrflow-org/ferrflow:latest
            ghcr.io/ferrflow-org/ferrflow:${{ steps.version.outputs.value }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ferrflow:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ferrflow:${{ steps.version.outputs.value }}
      - name: Attest Docker image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/ferrflow-org/ferrflow
          subject-digest: ${{ steps.docker-push.outputs.digest }}
          push-to-registry: true
