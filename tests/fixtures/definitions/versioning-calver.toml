[meta]
name = "versioning-calver"
description = "Calendar versioning uses YYYY.MM.PATCH format"

[config]
content = '''
{
  "workspace": {
    "versioning": "calver"
  },
  "package": [
    {
      "name": "myapp",
      "path": ".",
      "versioned_files": [{"path": "version.toml", "format": "toml"}]
    }
  ]
}
'''

[[packages]]
name = "myapp"
path = "."
initial_version = "2025.01.0"
tag = "v2025.01.0"

[[commits]]
message = "feat: add analytics"
files = ["src/analytics.rs"]

[expect]
check_contains = ["myapp"]
check_not_contains = ["Nothing to release"]
