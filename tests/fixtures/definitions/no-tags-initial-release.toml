[meta]
name = "no-tags-initial-release"
description = "First release when no tags exist yet"

[config]
content = '''
{
  "package": [
    {
      "name": "myapp",
      "path": ".",
      "versioned_files": [{"path": "version.toml", "format": "toml"}]
    }
  ]
}
'''

[[packages]]
name = "myapp"
path = "."
initial_version = "0.0.0"

[[commits]]
message = "feat: initial implementation"
files = ["src/main.rs"]

[expect]
check_contains = ["myapp", "0.1.0"]
check_not_contains = ["Nothing to release"]
