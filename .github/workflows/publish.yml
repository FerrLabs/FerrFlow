name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without v prefix)'
        required: true

jobs:
  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
      - name: Update version and publish
        working-directory: npm
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
      - name: Build and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR_MINOR=$(echo ${VERSION} | cut -d. -f1-2)

          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -t ghcr.io/ferrflow-org/ferrflow:${VERSION} .
          docker tag ghcr.io/ferrflow-org/ferrflow:${VERSION} ghcr.io/ferrflow-org/ferrflow:${MAJOR_MINOR}
          docker tag ghcr.io/ferrflow-org/ferrflow:${VERSION} ghcr.io/ferrflow-org/ferrflow:latest

          docker push ghcr.io/ferrflow-org/ferrflow:${VERSION}
          docker push ghcr.io/ferrflow-org/ferrflow:${MAJOR_MINOR}
          docker push ghcr.io/ferrflow-org/ferrflow:latest

          echo "Pushed ferrflow:${VERSION}, ${MAJOR_MINOR}, latest"
