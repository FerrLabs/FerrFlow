[meta]
name = "release-mode-pr"
description = "Release commit mode 'pr' opens a pull request instead of direct commit"

[config]
content = '''
{
  "workspace": {
    "releaseCommitMode": "pr"
  },
  "package": [
    {
      "name": "myapp",
      "path": ".",
      "versioned_files": [{"path": "version.toml", "format": "toml"}]
    }
  ]
}
'''

[[packages]]
name = "myapp"
path = "."
initial_version = "1.0.0"
tag = "v1.0.0"

[[commits]]
message = "fix: prevent data loss"
files = ["src/storage.rs"]

[expect]
check_contains = ["myapp", "1.0.1", "patch"]
check_not_contains = ["Nothing to release"]
