[meta]
name = "floating-tags-major"
description = "Floating tags configured with major level are reported in check output"

[config]
content = '''
{
  "workspace": {
    "floatingTags": ["major"]
  },
  "package": [
    {
      "name": "myapp",
      "path": ".",
      "versioned_files": [{"path": "version.toml", "format": "toml"}]
    }
  ]
}
'''

[[packages]]
name = "myapp"
path = "."
initial_version = "1.0.0"
tag = "v1.0.0"

[[commits]]
message = "feat: add dashboard"
files = ["src/dashboard.rs"]

[expect]
check_contains = ["myapp", "1.1.0", "minor", "floating tag"]
check_not_contains = ["Nothing to release"]
