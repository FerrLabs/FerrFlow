[meta]
name = "recover-missed-releases"
description = "With recoverMissedReleases, intermediate versions are created"

[config]
content = '''
{
  "workspace": {
    "recoverMissedReleases": true
  },
  "package": [
    {
      "name": "myapp",
      "path": ".",
      "versioned_files": [{"path": "version.toml", "format": "toml"}]
    }
  ]
}
'''

[[packages]]
name = "myapp"
path = "."
initial_version = "1.0.0"
tag = "v1.0.0"

[[commits]]
message = "feat: first feature"
files = ["src/one.rs"]

[[commits]]
message = "feat!: breaking change"
files = ["src/two.rs"]

[expect]
check_contains = ["myapp"]
check_not_contains = ["Nothing to release"]
